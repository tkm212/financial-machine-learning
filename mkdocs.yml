site_name: Financial Machine Learning
repo_url: https://github.com/tkm212bc/financial-machine-learning
site_url: https://tkm212bc.github.io/financial-machine-learning
site_description: Notebooks for Advances in Financial Machine Learning and Elements of Statistical Learning
site_author: tkm
edit_uri: edit/main/docs/
repo_name: tkm212bc/financial-machine-learning
copyright: Maintained by <a href="https://tkm212bc.com">tkm212bc</a>.

nav:
  - Home: index.md
  - Notebooks: notebooks.md
  - API Reference: modules.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tkm212bc/financial-machine-learning
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/financial-machine-learning

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
